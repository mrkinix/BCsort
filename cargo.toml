[package]
name = "bcsort"
version = "0.1.2"
edition = "2021"
authors = ["Hédi Ben Chiboub"]
description = "A fast, statistical, in-place ternary distribution sort."
license = "MIT"
repository = "https://github.com/yourusername/bcsort"
readme = "README.md"
keywords = ["sort", "parallel", "distribution-sort", "simd"]
categories = ["algorithms", "data-structures"]

[dependencies]
rayon = "1.8"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1